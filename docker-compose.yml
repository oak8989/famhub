# =============================================================================
# Family Hub - Docker Compose Configuration
# Self-contained deployment with MongoDB embedded
# =============================================================================
#
# Quick Start:
#   1. Copy this file to your server
#   2. Change JWT_SECRET to a secure random string
#   3. Run: docker-compose up -d
#   4. Access: http://localhost:8001
#
# =============================================================================

version: '3.8'

services:
  famhub:
    image: ghcr.io/oak8989/famhub:latest
    container_name: famhub
    ports:
      - "8001:8001"
    volumes:
      # Database persistence - DO NOT REMOVE
      - famhub-data:/data/db
    environment:
      # ===========================================
      # REQUIRED: Change this to a secure secret!
      # ===========================================
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret-key}
      
      # ===========================================
      # OPTIONAL: Email Configuration (SMTP)
      # Uncomment to enable email invitations
      # ===========================================
      # - SMTP_HOST=smtp.gmail.com
      # - SMTP_PORT=587
      # - SMTP_USER=your-email@gmail.com
      # - SMTP_PASSWORD=your-app-password
      # - SMTP_FROM=Family Hub <noreply@familyhub.local>
      
      # ===========================================
      # OPTIONAL: Google Calendar Integration
      # Set up at: https://console.cloud.google.com
      # ===========================================
      # - GOOGLE_CLIENT_ID=your-client-id
      # - GOOGLE_CLIENT_SECRET=your-client-secret
      # - GOOGLE_REDIRECT_URI=https://your-domain.com/api/calendar/google/callback
      
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  famhub-data:
    name: famhub-data
