version: '3.8'

# =============================================================================
# Family Hub - Self-Contained Deployment
# Single container with MongoDB included
# =============================================================================

services:
  family-hub:
    image: ghcr.io/oak8989/family-hub:latest
    container_name: family-hub
    ports:
      - "8001:8001"
    volumes:
      # Persistent data storage
      - family-hub-data:/data/db
      - family-hub-photos:/app/backend/photos
    environment:
      # Required: Change this to a secure random string!
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-key}
      
      # Optional: Email invitations
      # - SMTP_HOST=smtp.gmail.com
      # - SMTP_PORT=587
      # - SMTP_USER=your-email@gmail.com
      # - SMTP_PASSWORD=your-app-password
      # - SMTP_FROM=Family Hub <noreply@familyhub.local>
      
      # Optional: Google Calendar sync
      # - GOOGLE_CLIENT_ID=your-client-id
      # - GOOGLE_CLIENT_SECRET=your-client-secret
      # - GOOGLE_REDIRECT_URI=https://your-domain.com/api/calendar/google/callback
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  family-hub-data:
    name: family-hub-data
  family-hub-photos:
    name: family-hub-photos
